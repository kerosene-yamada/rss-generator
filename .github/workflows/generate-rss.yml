name: Generate RSS Feed

on:
  schedule:
    # 6時間おきに実行（UTC基準: 0時・6時・12時・18時）
    - cron: '0 0,6,12,18 * * *'
  # 手動でも実行できるようにする
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    # リポジトリへの書き込み権限を付与
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate RSS feed
        run: npx ts-node src/index.ts

      - name: Commit and push feed.xml
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/feed.xml
          # 変更があるときだけコミット
          git diff --staged --quiet || git commit -m "chore: update RSS feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
