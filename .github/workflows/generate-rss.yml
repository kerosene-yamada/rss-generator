name: Generate RSS Feed

on:
  schedule:
    - cron: '0 3,21 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Generate RSS feed
        run: npx ts-node src/index.ts
        env:
          RUN_MODE: rss
          HUG_USER: ${{ secrets.HUG_USER }}
          HUG_PASS: ${{ secrets.HUG_PASS }}

      - name: Commit and push feeds
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/gemini-feed.xml docs/hug-feed.xml
          git diff --staged --quiet || git commit -m "chore: update RSS feeds [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
