name: Gov Report to Slack

on:
  schedule:
    - cron: '0 21 * * 0'
    - cron: '0 21 * * 2'
  workflow_dispatch:
    inputs:
      target:
        description: '実行対象 (shougaiji / ahaki)'
        required: true
        default: 'shougaiji'
        type: choice
        options:
          - shougaiji
          - ahaki

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Determine report target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.target }}" >> $GITHUB_OUTPUT
          else
            DOW=$(date -u +%w)
            if [ "$DOW" = "0" ]; then
              echo "target=shougaiji" >> $GITHUB_OUTPUT
            else
              echo "target=ahaki" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run gov report
        run: npx ts-node src/index.ts
        env:
          RUN_MODE: gov-report
          REPORT_TARGET: ${{ steps.target.outputs.target }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
